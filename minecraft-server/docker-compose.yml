version: "3.8"

services:
  mc-server:
    build: .
    container_name: minecraft_server
    ports:
      - "8888:25565"
    environment:
      EULA: "TRUE"
      MEMORY: "2G"
    volumes:
      - ./server.properties:/app/server.properties
      - mc-server-volume:/app
      - mc_data:/app/world
    restart: unless-stopped

volumes:
  mc-server-volume:
    driver: local
  mc_data:
    driver: local
